services:
  api:
    extra_hosts:
      - "host.docker.internal:host-gateway"

    image: ghcr.io/janexpl/courseslistnext-api:latest
    restart: unless-stopped
    ports:
      - "${PORT:-8082}:${PORT-8082}"
    env_file: .env
    healthcheck:
      test:
        ["CMD", "wget", "-qO-", "http://localhost:${PORT:-8082}/api/v1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: ghcr.io/janexpl/courseslistnext-web:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NUXT_API_TARGET=http://api:8082
    depends_on:
      api:
        condition: service_healthy
